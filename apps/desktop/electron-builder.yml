appId: com.cursor-urban.desktop
productName: Cursor for Urban Planners
directories:
  buildResources: build
  output: release
files:
  - out/**/*
mac:
  target:
    - zip
  category: public.app-category.developer-tools
  artifactName: "Cursor-for-Urban-Planners-${version}-${arch}.${ext}"
win:
  target:
    - nsis
    - zip
  artifactName: "Cursor-for-Urban-Planners-${version}-${arch}.${ext}"
extraResources:
  - from: ../../packages/backend/dist/backend
    to: backend
    filter:
      - "**/*"
publish:
  provider: github
  owner: Smriti-kinra
  repo: Cursor-for-Urban-Planners
